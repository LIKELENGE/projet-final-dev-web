<div class="login-page d-flex align-items-center justify-content-center">
  <div class="card login-card shadow-lg border-0">
    <div class="card-body p-4 p-md-5">
      <h2 class="text-center mb-4">Connexion</h2>

      @if (utilisateurService.erreur()) {
        <div class="alert alert-danger" role="alert">{{ utilisateurService.erreur() }}</div>
      }

      @if (utilisateurService.message()) {
        <div class="alert alert-success" role="status">{{ utilisateurService.message() }}</div>
      }

      <form (submit)="login($event, email.value, password.value)">
        <div class="mb-3">
          <label for="email" class="form-label">Adresse email</label>
          <input
            #email
            type="email"
            class="form-control"
            id="email"
            placeholder="exemple@email.com"
            required
          />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Mot de passe</label>
          <input
            #password
            type="password"
            class="form-control"
            id="password"
            placeholder="Votre mot de passe"
            required
          />
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember" />
            <label class="form-check-label" for="remember">
              Se souvenir de moi
            </label>
          </div>

          <a href="#" class="text-decoration-none">Mot de passe oublie ?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="utilisateurService.chargement()">
          Se connecter
        </button>
      </form>

      <p class="text-center mt-4 mb-0">
        Pas encore de compte ?
        <a routerLink="/inscription" class="text-decoration-none">Creer un compte</a>
      </p>
    </div>
  </div>
</div>
